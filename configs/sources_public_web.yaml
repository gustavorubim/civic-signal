# Production candidate registry: every source is public HTTPS, keyless, and
# explicitly classified as free_public_web. This registry intentionally excludes
# all local fixture and generated sources.
extends: sources_official_results.yaml
sources:
  - id: fivethirtyeight_president_polls
    table: polls
    type: http_csv
    path: president_polls.csv
    parser_version: fivethirtyeight-president-polls-v1
    license: Public FiveThirtyEight/Datasette polling table; record terms before redistribution.
    auth_mode: public
    source_class: production_web
    access_policy: free_public_web
    terms_status: reviewed_for_use
    url: https://fivethirtyeight.datasettes.com/polls/president_polls.csv?_stream=on
    parser_args:
      cycle: 2020
      state: wisconsin
      stage: general
      race_id: US-PRES-WI-2020
      parties: [DEM, REP]
  - id: fivethirtyeight_senate_polls_2026
    table: polls
    type: http_csv
    path: senate_polls.csv
    parser_version: fivethirtyeight-general-polls-v1
    license: Public FiveThirtyEight/Datasette polling table; record terms before redistribution.
    auth_mode: public
    source_class: production_web
    access_policy: free_public_web
    terms_status: reviewed_for_use
    url: https://fivethirtyeight.datasettes.com/polls/senate_polls.csv?cycle=2026&_stream=on
    parser_args:
      cycle: 2026
      office: senate
      stage: general
      parties: [DEM, REP]
  - id: fivethirtyeight_governor_polls_2026
    table: polls
    type: http_csv
    path: governor_polls.csv
    parser_version: fivethirtyeight-general-polls-v1
    license: Public FiveThirtyEight/Datasette polling table; record terms before redistribution.
    auth_mode: public
    source_class: production_web
    access_policy: free_public_web
    terms_status: reviewed_for_use
    url: https://fivethirtyeight.datasettes.com/polls/governor_polls.csv?cycle=2026&_stream=on
    parser_args:
      cycle: 2026
      office: governor
      stage: general
      parties: [DEM, REP]
  - id: fivethirtyeight_house_polls_2026
    table: polls
    type: http_csv
    path: house_polls.csv
    parser_version: fivethirtyeight-general-polls-v1
    license: Public FiveThirtyEight/Datasette polling table; record terms before redistribution.
    auth_mode: public
    source_class: production_web
    access_policy: free_public_web
    terms_status: reviewed_for_use
    url: https://fivethirtyeight.datasettes.com/polls/house_polls.csv?cycle=2026&_stream=on
    parser_args:
      cycle: 2026
      office: house
      stage: general
      parties: [DEM, REP]
      house_race_id_format: compact
  - id: fred_unrate_fundamentals
    table: fundamentals
    type: http_csv
    path: fred_unrate.csv
    parser_version: fred-national-fundamentals-v1
    license: Federal Reserve Bank of St. Louis FRED CSV for BLS unemployment series UNRATE; keyless read-only macro signal.
    auth_mode: public
    source_class: production_web
    access_policy: free_public_web
    terms_status: reviewed_for_use
    url: https://fred.stlouisfed.org/graph/fredgraph.csv?id=UNRATE
    parser_args:
      series_id: UNRATE
  - id: wikipedia_senate_race_presence
    table: public_signals
    type: http_text
    path: wikipedia_senate.wikitext
    parser_version: wikipedia-race-presence-signals-v1
    license: Wikipedia article text under CC BY-SA/GFDL; used only as opt-in race-presence metadata.
    auth_mode: public
    source_class: production_web
    access_policy: free_public_web
    terms_status: reviewed_for_use
    url: https://en.wikipedia.org/wiki/2026_United_States_Senate_elections?action=raw
    parser_args:
      cycle: 2026
  - id: wikipedia_governor_race_presence
    table: public_signals
    type: http_text
    path: wikipedia_governor.wikitext
    parser_version: wikipedia-race-presence-signals-v1
    license: Wikipedia article text under CC BY-SA/GFDL; used only as opt-in race-presence metadata.
    auth_mode: public
    source_class: production_web
    access_policy: free_public_web
    terms_status: reviewed_for_use
    url: https://en.wikipedia.org/wiki/2026_United_States_gubernatorial_elections?action=raw
    parser_args:
      cycle: 2026
  - id: wikipedia_house_race_presence
    table: public_signals
    type: http_text
    path: wikipedia_house.wikitext
    parser_version: wikipedia-race-presence-signals-v1
    license: Wikipedia article text under CC BY-SA/GFDL; used only as opt-in race-presence metadata.
    auth_mode: public
    source_class: production_web
    access_policy: free_public_web
    terms_status: reviewed_for_use
    url: https://en.wikipedia.org/wiki/2026_United_States_House_of_Representatives_elections?action=raw
    parser_args:
      cycle: 2026
