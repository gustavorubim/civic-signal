rolling_origin:
  holdout_cycles: [2022, 2024]
  # Folds are independent refits; run them across processes (1 = serial).
  parallel_folds: 5
  min_races: 2
  as_of_offsets_days: [90, 60, 30, 7, 1]
minimum_rows_for_trust: 30
nested_evaluation:
  # Independent election cycles, never race rows, are the uncertainty units.
  minimum_cycles_for_uncertainty: 3
  cycle_bootstrap_replicates: 2000
  cycle_bootstrap_seed: 20260508
metrics:
  - brier
  - log_score
  - calibration
  - expected_calibration_error
  - interval_coverage
baselines:
  - historical_partisan_lean
  - polling_average
  - market_implied
  - incumbent_party_prior
  - previous_cycle_swing
